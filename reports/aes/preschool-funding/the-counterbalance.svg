<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 540" font-family="'Source Serif 4', Charter, Cambria, Georgia, serif">
  <rect width="800" height="540" fill="#faf7f1"/>

  <!-- Title -->
  <text x="400" y="42" text-anchor="middle" font-size="22" font-weight="600" fill="#1f1d18">
    Direct subsidy vs. avoided-mandate offset
  </text>
  <text x="400" y="66" text-anchor="middle" font-size="14" font-style="italic" fill="#4a463d">
    Once the federal special-ed obligation is accounted for, the program produces net savings
  </text>

  <!-- Chart area: x 80-720, y 130-440. Y scale: -$220K to +$120K. Zero line at y=247. -->

  <!-- Y axis gridlines -->
  <line x1="100" y1="150" x2="700" y2="150" stroke="#e8e2d3" stroke-dasharray="2 3"/>
  <text x="92" y="154" text-anchor="end" font-size="11" font-family="'IBM Plex Sans', sans-serif" fill="#7a7466">+$100K</text>

  <line x1="100" y1="247" x2="700" y2="247" stroke="#7a7466" stroke-width="1"/>
  <text x="92" y="251" text-anchor="end" font-size="11" font-family="'IBM Plex Sans', sans-serif" font-weight="600" fill="#1f1d18">$0</text>

  <line x1="100" y1="344" x2="700" y2="344" stroke="#e8e2d3" stroke-dasharray="2 3"/>
  <text x="92" y="348" text-anchor="end" font-size="11" font-family="'IBM Plex Sans', sans-serif" fill="#7a7466">&#8722;$100K</text>

  <line x1="100" y1="441" x2="700" y2="441" stroke="#e8e2d3" stroke-dasharray="2 3"/>
  <text x="92" y="445" text-anchor="end" font-size="11" font-family="'IBM Plex Sans', sans-serif" fill="#7a7466">&#8722;$200K</text>

  <!-- Bar 1: +$92K direct subsidy (cost, oxblood) -->
  <rect x="150" y="158" width="100" height="89" fill="#6b3a2c" opacity="0.85" rx="2"/>
  <text x="200" y="207" text-anchor="middle" font-size="20" font-weight="700" fill="#fffdf8" font-family="'IBM Plex Sans', sans-serif">+$92K</text>
  <text x="200" y="270" text-anchor="middle" font-size="12.5" font-weight="600" fill="#1f1d18">Direct net subsidy</text>
  <text x="200" y="287" text-anchor="middle" font-size="11" fill="#7a7466">(operating ledger,</text>
  <text x="200" y="301" text-anchor="middle" font-size="11" fill="#7a7466">Part 3 mid-estimate)</text>

  <!-- Connector from bar 1 top to bar 2 top -->
  <line x1="250" y1="158" x2="350" y2="158" stroke="#7a7466" stroke-dasharray="3 3" stroke-width="1"/>

  <!-- Bar 2: -$200K avoided mandate (savings, green). Top stays at y=158, drops to y=352. -->
  <rect x="350" y="158" width="100" height="194" fill="#2a7a3f" opacity="0.85" rx="2"/>
  <text x="400" y="262" text-anchor="middle" font-size="20" font-weight="700" fill="#fffdf8" font-family="'IBM Plex Sans', sans-serif">&#8722;$200K</text>
  <text x="400" y="375" text-anchor="middle" font-size="12.5" font-weight="600" fill="#1f1d18">Avoided special-ed</text>
  <text x="400" y="391" text-anchor="middle" font-size="12.5" font-weight="600" fill="#1f1d18">compliance cost</text>
  <text x="400" y="408" text-anchor="middle" font-size="11" fill="#7a7466">(Part 4 estimate,</text>
  <text x="400" y="422" text-anchor="middle" font-size="11" fill="#7a7466">$170K&#8211;230K range)</text>

  <!-- Connector from bar 2 bottom to bar 3 top -->
  <line x1="450" y1="352" x2="550" y2="352" stroke="#7a7466" stroke-dasharray="3 3" stroke-width="1"/>

  <!-- Bar 3: net -$108K (savings, green). From zero (y=247) down to y=352. -->
  <rect x="550" y="247" width="100" height="105" fill="#2a7a3f" opacity="0.85" rx="2"/>
  <text x="600" y="305" text-anchor="middle" font-size="20" font-weight="700" fill="#fffdf8" font-family="'IBM Plex Sans', sans-serif">&#8722;$108K</text>
  <text x="600" y="375" text-anchor="middle" font-size="12.5" font-weight="600" fill="#1f1d18">Net cost to the town</text>
  <text x="600" y="392" text-anchor="middle" font-size="11.5" font-style="italic" fill="#2a7a3f">(actually a saving)</text>
  <text x="600" y="411" text-anchor="middle" font-size="11" fill="#7a7466">~$77 per household</text>
  <text x="600" y="425" text-anchor="middle" font-size="11" fill="#7a7466">per year saved</text>

  <!-- Bottom annotation -->
  <rect x="50" y="470" width="700" height="55" fill="#f1e6df" rx="2"/>
  <text x="400" y="491" text-anchor="middle" font-size="12.5" font-style="italic" fill="#1f1d18">
    IDEA Part B requires the district to provide Free Appropriate Public Education to children with disabilities ages 3&#8211;5
  </text>
  <text x="400" y="510" text-anchor="middle" font-size="12.5" font-style="italic" fill="#1f1d18">
    whether or not the preschool exists. The inclusive program fulfills that mandate at incidental cost.
  </text>
</svg>
