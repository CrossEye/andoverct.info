<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 540" font-family="'Source Serif 4', Charter, Cambria, Georgia, serif">
  <rect width="800" height="540" fill="#faf7f1"/>

  <!-- Title -->
  <text x="400" y="42" text-anchor="middle" font-size="22" font-weight="600" fill="#1f1d18">
    Where the money comes from, where it goes
  </text>
  <text x="400" y="66" text-anchor="middle" font-size="14" font-style="italic" fill="#4a463d">
    FY 2025&#8211;26 anticipated, per the BOE&#8217;s April 2026 financial report
  </text>

  <!-- LEFT side: revenue sources -->
  <text x="170" y="115" text-anchor="middle" font-size="11" font-family="'IBM Plex Sans', sans-serif" font-weight="600" fill="#7a7466" letter-spacing="1.5">REVENUE IN</text>

  <!-- Tuition group -->
  <rect x="60" y="135" width="220" height="135" fill="#fffdf8" stroke="#d9d2c2" stroke-width="1.5" rx="3"/>
  <text x="170" y="158" text-anchor="middle" font-size="14" font-weight="600" fill="#1f1d18">Family tuition</text>
  <text x="75" y="180" font-size="12" fill="#4a463d">Full-pay families</text>
  <text x="265" y="180" text-anchor="end" font-size="12" font-weight="600" fill="#1f1d18" font-family="'IBM Plex Sans', sans-serif">$155,566</text>
  <text x="75" y="200" font-size="12" fill="#4a463d">Early Start sliding scale</text>
  <text x="265" y="200" text-anchor="end" font-size="12" font-weight="600" fill="#1f1d18" font-family="'IBM Plex Sans', sans-serif">$60,480</text>
  <text x="75" y="220" font-size="12" fill="#4a463d">Smart Start sliding scale</text>
  <text x="265" y="220" text-anchor="end" font-size="12" font-weight="600" fill="#1f1d18" font-family="'IBM Plex Sans', sans-serif">$31,940</text>
  <line x1="75" y1="232" x2="265" y2="232" stroke="#d9d2c2"/>
  <text x="75" y="252" font-size="12.5" font-weight="600" fill="#4a463d">Tuition subtotal</text>
  <text x="265" y="252" text-anchor="end" font-size="13" font-weight="700" fill="#6b3a2c" font-family="'IBM Plex Sans', sans-serif">$247,986</text>

  <!-- Grants group -->
  <rect x="60" y="290" width="220" height="100" fill="#fffdf8" stroke="#d9d2c2" stroke-width="1.5" rx="3"/>
  <text x="170" y="313" text-anchor="middle" font-size="14" font-weight="600" fill="#1f1d18">State grants (OEC)</text>
  <text x="75" y="335" font-size="12" fill="#4a463d">Early Start grant</text>
  <text x="265" y="335" text-anchor="end" font-size="12" font-weight="600" fill="#1f1d18" font-family="'IBM Plex Sans', sans-serif">$123,000</text>
  <text x="75" y="355" font-size="12" fill="#4a463d">Smart Start grant</text>
  <text x="265" y="355" text-anchor="end" font-size="12" font-weight="600" fill="#1f1d18" font-family="'IBM Plex Sans', sans-serif">$65,000</text>
  <line x1="75" y1="367" x2="265" y2="367" stroke="#d9d2c2"/>
  <text x="75" y="383" font-size="12.5" font-weight="600" fill="#4a463d">Grants subtotal</text>
  <text x="265" y="383" text-anchor="end" font-size="13" font-weight="700" fill="#6b3a2c" font-family="'IBM Plex Sans', sans-serif">$188,000</text>

  <!-- Total Revenue (between left and arrows) -->
  <rect x="60" y="410" width="220" height="44" fill="#f1e6df" stroke="#6b3a2c" stroke-width="1.5" rx="3"/>
  <text x="75" y="437" font-size="13" font-weight="600" fill="#1f1d18">Total revenue</text>
  <text x="265" y="437" text-anchor="end" font-size="14" font-weight="700" fill="#6b3a2c" font-family="'IBM Plex Sans', sans-serif">$435,986</text>

  <!-- Flow arrows from revenue to expenses -->
  <path d="M 290 200 Q 380 200 410 270 L 510 270" stroke="#6b3a2c" stroke-width="2" fill="none" opacity="0.55"/>
  <path d="M 290 340 Q 380 340 410 280 L 510 280" stroke="#6b3a2c" stroke-width="2" fill="none" opacity="0.55"/>
  <path d="M 290 432 Q 380 432 410 290 L 510 290" stroke="#6b3a2c" stroke-width="2" fill="none" opacity="0.55"/>
  <polygon points="510,265 525,275 510,285" fill="#6b3a2c" opacity="0.85"/>

  <!-- RIGHT side: expenses -->
  <text x="630" y="115" text-anchor="middle" font-size="11" font-family="'IBM Plex Sans', sans-serif" font-weight="600" fill="#7a7466" letter-spacing="1.5">FUNDS THESE EXPENSES</text>

  <!-- Big bar: salaries -->
  <rect x="530" y="135" width="220" height="195" fill="#fffdf8" stroke="#d9d2c2" stroke-width="1.5" rx="3"/>
  <text x="640" y="158" text-anchor="middle" font-size="14" font-weight="600" fill="#1f1d18">8 preschool staff salaries</text>
  <text x="640" y="178" text-anchor="middle" font-size="11.5" font-style="italic" fill="#7a7466">4 teachers + 4 paraeducators</text>

  <!-- Inner bar visualization -->
  <rect x="550" y="200" width="180" height="72" fill="#6b3a2c" opacity="0.85" rx="2"/>
  <text x="640" y="244" text-anchor="middle" font-size="22" font-weight="700" fill="#fffdf8" font-family="'IBM Plex Sans', sans-serif">$399,951</text>

  <text x="640" y="298" text-anchor="middle" font-size="11.5" fill="#4a463d">Funded across the three sources:</text>
  <text x="640" y="316" text-anchor="middle" font-size="11" fill="#7a7466">tuition (5 staff) · ES grant (2) · SS grant (1)</text>

  <!-- Smaller bar: operating remainder -->
  <rect x="530" y="350" width="220" height="100" fill="#fffdf8" stroke="#d9d2c2" stroke-width="1.5" rx="3"/>
  <text x="640" y="373" text-anchor="middle" font-size="13.5" font-weight="600" fill="#1f1d18">Remainder for operating</text>
  <rect x="550" y="385" width="33" height="36" fill="#6b3a2c" opacity="0.55" rx="2"/>
  <text x="640" y="409" text-anchor="middle" font-size="17" font-weight="700" fill="#1f1d18" font-family="'IBM Plex Sans', sans-serif">$36,035</text>
  <text x="640" y="438" text-anchor="middle" font-size="11" fill="#7a7466">substitutes &#183; supplies &#183; classroom costs</text>

  <!-- Bottom annotation -->
  <text x="400" y="495" text-anchor="middle" font-size="13" font-style="italic" fill="#4a463d">
    Tuition and state grants together pay the eight preschool staff with about $36,000 left for operating.
  </text>
  <text x="400" y="515" text-anchor="middle" font-size="13" font-style="italic" fill="#4a463d">
    The program is roughly revenue-neutral on its own ledger &#8212; before benefits are loaded in.
  </text>
</svg>
