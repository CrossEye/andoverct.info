<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 540" font-family="'Source Serif 4', Charter, Cambria, Georgia, serif">
  <rect width="800" height="540" fill="#faf7f1"/>

  <!-- Title block -->
  <text x="400" y="42" text-anchor="middle" font-size="22" font-weight="600" fill="#1f1d18">
    Two separate funds, two separate budgets
  </text>
  <text x="400" y="66" text-anchor="middle" font-size="14" font-style="italic" fill="#4a463d">
    Why a vote on the BOE budget is not a vote on the preschool
  </text>

  <!-- General Fund column -->
  <rect x="50" y="100" width="335" height="335" fill="#fffdf8" stroke="#d9d2c2" stroke-width="1.5" rx="3"/>
  <text x="217" y="130" text-anchor="middle" font-size="17" font-weight="600" fill="#1f1d18">General Fund</text>
  <text x="217" y="150" text-anchor="middle" font-size="10.5" font-family="'IBM Plex Sans', sans-serif" fill="#7a7466" letter-spacing="1.8">K&#8211;6 OPERATING BUDGET</text>
  <line x1="70" y1="170" x2="365" y2="170" stroke="#e8e2d3"/>

  <text x="70" y="195" font-size="11" font-family="'IBM Plex Sans', sans-serif" font-weight="600" fill="#7a7466" letter-spacing="1.2">REVENUE IN</text>
  <circle cx="78" cy="217" r="2.5" fill="#7a7466"/>
  <text x="90" y="221" font-size="13.5" fill="#4a463d">Property tax levy</text>
  <circle cx="78" cy="237" r="2.5" fill="#7a7466"/>
  <text x="90" y="241" font-size="13.5" fill="#4a463d">State education aid (ECS, etc.)</text>
  <circle cx="78" cy="257" r="2.5" fill="#7a7466"/>
  <text x="90" y="261" font-size="13.5" fill="#4a463d">Other town receipts</text>

  <text x="70" y="298" font-size="11" font-family="'IBM Plex Sans', sans-serif" font-weight="600" fill="#7a7466" letter-spacing="1.2">FUNDS</text>
  <circle cx="78" cy="320" r="2.5" fill="#7a7466"/>
  <text x="90" y="324" font-size="13.5" fill="#4a463d">K&#8211;6 instruction at AES</text>
  <circle cx="78" cy="340" r="2.5" fill="#7a7466"/>
  <text x="90" y="344" font-size="13.5" fill="#4a463d">RHAM regional levy</text>
  <circle cx="78" cy="360" r="2.5" fill="#7a7466"/>
  <text x="90" y="364" font-size="13.5" fill="#4a463d">Administration &amp; overhead</text>
  <circle cx="78" cy="380" r="2.5" fill="#7a7466"/>
  <text x="90" y="384" font-size="13.5" fill="#4a463d">Building, utilities, custodial</text>
  <circle cx="78" cy="400" r="2.5" fill="#7a7466"/>
  <text x="90" y="404" font-size="13.5" fill="#4a463d">Town departments</text>

  <!-- School Grants Fund column -->
  <rect x="415" y="100" width="335" height="335" fill="#fffdf8" stroke="#d9d2c2" stroke-width="1.5" rx="3"/>
  <text x="582" y="130" text-anchor="middle" font-size="17" font-weight="600" fill="#1f1d18">School Grants Fund</text>
  <text x="582" y="150" text-anchor="middle" font-size="10.5" font-family="'IBM Plex Sans', sans-serif" fill="#7a7466" letter-spacing="1.8">PRESCHOOL</text>
  <line x1="435" y1="170" x2="730" y2="170" stroke="#e8e2d3"/>

  <text x="435" y="195" font-size="11" font-family="'IBM Plex Sans', sans-serif" font-weight="600" fill="#7a7466" letter-spacing="1.2">REVENUE IN</text>
  <circle cx="443" cy="217" r="2.5" fill="#7a7466"/>
  <text x="455" y="221" font-size="13.5" fill="#4a463d">Family tuition  ~$248K</text>
  <circle cx="443" cy="237" r="2.5" fill="#7a7466"/>
  <text x="455" y="241" font-size="13.5" fill="#4a463d">Early Start grant (state)  $123K</text>
  <circle cx="443" cy="257" r="2.5" fill="#7a7466"/>
  <text x="455" y="261" font-size="13.5" fill="#4a463d">Smart Start grant (state)  $65K</text>

  <text x="435" y="298" font-size="11" font-family="'IBM Plex Sans', sans-serif" font-weight="600" fill="#7a7466" letter-spacing="1.2">FUNDS</text>
  <circle cx="443" cy="320" r="2.5" fill="#7a7466"/>
  <text x="455" y="324" font-size="13.5" fill="#4a463d">4 preschool teachers</text>
  <circle cx="443" cy="340" r="2.5" fill="#7a7466"/>
  <text x="455" y="344" font-size="13.5" fill="#4a463d">4 paraeducators</text>
  <circle cx="443" cy="360" r="2.5" fill="#7a7466"/>
  <text x="455" y="364" font-size="13.5" fill="#4a463d">Substitutes  ~$8.5K</text>
  <circle cx="443" cy="380" r="2.5" fill="#7a7466"/>
  <text x="455" y="384" font-size="13.5" fill="#4a463d">Classroom supplies  ~$4.5K</text>

  <!-- Wall divider (drawn on top so the SEPARATE label isn't covered by either column box) -->
  <line x1="400" y1="105" x2="400" y2="430" stroke="#6b3a2c" stroke-width="1.5" stroke-dasharray="5 4"/>
  <rect x="362" y="258" width="76" height="22" fill="#faf7f1"/>
  <text x="400" y="274" text-anchor="middle" font-size="10.5" font-family="'IBM Plex Sans', sans-serif" font-weight="600" fill="#6b3a2c" letter-spacing="2">SEPARATE</text>

  <!-- Bottom annotation -->
  <rect x="50" y="455" width="700" height="65" fill="#f1e6df" rx="2"/>
  <text x="400" y="478" text-anchor="middle" font-size="13.5" font-style="italic" fill="#1f1d18">
    A reduction to the BOE General Fund cuts K&#8211;6 programming.
  </text>
  <text x="400" y="498" text-anchor="middle" font-size="13.5" font-style="italic" fill="#1f1d18">
    It cannot &#8220;cut preschool,&#8221; because no preschool spending lives in the General Fund to be cut.
  </text>
</svg>
