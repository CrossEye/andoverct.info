<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080"
     font-family="Georgia, 'Times New Roman', serif">

  <rect width="1080" height="1080" fill="#faf6ec"/>

  <!-- small standing masthead -->
  <text x="540" y="96" text-anchor="middle" font-size="38" font-weight="900" fill="#6B1B1B">The Facts</text>
  <line x1="160" y1="140" x2="920" y2="140" stroke="#c8a878" stroke-width="2"/>

  <!-- eyebrow -->
  <text x="540" y="222" text-anchor="middle"
        font-family="Arial, system-ui, sans-serif" font-size="20" font-weight="700"
        letter-spacing="3" fill="#6B1B1B">AT THE MAY 27 BOARD OF FINANCE MEETING</text>

  <!-- pulled quote, centered -->
  <text x="540" y="340" text-anchor="middle" font-size="42" font-style="italic" fill="#222">&#8220;They completely disregarded that cut</text>
  <text x="540" y="400" text-anchor="middle" font-size="42" font-style="italic" fill="#222">and hired those people anyway.&#8221;</text>

  <!-- attribution -->
  <text x="540" y="466" text-anchor="middle"
        font-family="Arial, system-ui, sans-serif" font-size="18" fill="#777">&#8212; Andover Board of Finance meeting, May 27, 2026</text>

  <!-- decorative gold rule between claim and response -->
  <line x1="490" y1="556" x2="590" y2="556" stroke="#c8a878" stroke-width="2"/>

  <!-- the answer -->
  <text x="540" y="676" text-anchor="middle" font-size="54" font-weight="900" fill="#6B1B1B">That is not defiance.</text>
  <text x="540" y="748" text-anchor="middle" font-size="54" font-weight="900" fill="#6B1B1B">That is the system</text>
  <text x="540" y="820" text-anchor="middle" font-size="54" font-weight="900" fill="#6B1B1B">working as designed.</text>

  <!-- foot -->
  <line x1="160" y1="916" x2="920" y2="916" stroke="#c8a878" stroke-width="1.5"/>
  <text x="540" y="962" text-anchor="middle" font-size="22" font-style="italic" fill="#555">Read: &#8220;Who Decides How the Schools Are Run&#8221;</text>
  <text x="540" y="1010" text-anchor="middle"
        font-family="Arial, system-ui, sans-serif" font-size="20" font-weight="700"
        letter-spacing="2" fill="#6B1B1B">andoverct.info</text>
</svg>
