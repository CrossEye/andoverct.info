<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080"
     font-family="Georgia, 'Times New Roman', serif">

  <!-- cream ground; typography holds the composition, no frame -->
  <rect width="1080" height="1080" fill="#faf6ec"/>

  <!-- eyebrow -->
  <text x="540" y="128" text-anchor="middle"
        font-family="Arial, system-ui, sans-serif" font-size="22" font-weight="600"
        letter-spacing="6" fill="#777">AN ANDOVERCT.INFO EDITION</text>

  <!-- masthead -->
  <text x="540" y="290" text-anchor="middle"
        font-size="160" font-weight="900" letter-spacing="-3" fill="#6B1B1B">The Facts</text>

  <!-- double rule -->
  <line x1="160" y1="340" x2="920" y2="340" stroke="#c8a878" stroke-width="3"/>
  <line x1="160" y1="354" x2="920" y2="354" stroke="#c8a878" stroke-width="1.5"/>

  <!-- issue marker -->
  <text x="540" y="406" text-anchor="middle"
        font-family="Arial, system-ui, sans-serif" font-size="20" font-weight="700"
        letter-spacing="4" fill="#555">ISSUE NO. 2 &#183; JUNE 1, 2026</text>

  <!-- edition title (burgundy/ink split, mirroring the page hero) -->
  <text x="540" y="558" text-anchor="middle" font-size="82" font-weight="900"
        letter-spacing="-1" fill="#222">Who <tspan fill="#6B1B1B">Decides</tspan> How</text>
  <text x="540" y="650" text-anchor="middle" font-size="82" font-weight="900"
        letter-spacing="-1" fill="#222">the Schools Are Run</text>

  <!-- italic dek -->
  <text x="540" y="794" text-anchor="middle" font-size="32" font-style="italic" fill="#555">A note on the roles of the Board of Finance</text>
  <text x="540" y="840" text-anchor="middle" font-size="32" font-style="italic" fill="#555">and the Board of Education.</text>

  <!-- foot rule + wordmark -->
  <line x1="160" y1="968" x2="920" y2="968" stroke="#c8a878" stroke-width="1.5"/>
  <text x="540" y="1014" text-anchor="middle" font-size="26" font-weight="700" fill="#6B1B1B">andoverct.info</text>
</svg>
