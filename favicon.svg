<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Andover, CT">
  <!-- Navy disc with a thin gold rim -->
  <circle cx="32" cy="32" r="32" fill="#143862"/>
  <circle cx="32" cy="32" r="30" fill="none" stroke="#e8a800" stroke-width="1.4" opacity="0.5"/>
  <g font-family="Arial, 'Helvetica Neue', Helvetica, sans-serif" text-anchor="middle">
    <!-- White "CT" — crisp unit at the bottom -->
    <text x="32.5" y="55" font-weight="700" font-size="20" letter-spacing="1" fill="#ffffff">CT</text>
    <!-- Gold "A" — larger, above, base just kissing the top of the CT -->
    <text x="32" y="42" font-weight="800" font-size="40" fill="#e8a800">A</text>
  </g>
</svg>
